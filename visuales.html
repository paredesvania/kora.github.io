<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visuales — KORA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── GRID DE VENTANAS ── */
    .vis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      gap: 2px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px;
    }

    /* Ventana grande — ocupa columna 1 entera */
    .vis-win-big   { grid-column: 1; grid-row: 1 / 3; }
    /* Dos ventanas pequeñas a la derecha */
    .vis-win-sm    { grid-column: 2; }
    /* Ventana que cruza las dos columnas abajo */
    .vis-win-wide  { grid-column: 1 / 3; }

    /* ── VENTANA ── */
    .vis-win {
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
      border-radius: 6px;
    }

    /* Barra superior tipo terminal */
    .vis-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .vis-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      opacity: 0.6;
    }
    .vis-dot-r { background: #ff5f57; }
    .vis-dot-y { background: #ffbd2e; }
    .vis-dot-g { background: #28c840; }
    .vis-bar-title {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-left: 8px;
      font-family: 'Poppins', sans-serif;
    }

    /* iframe que llena la ventana */
    .vis-win iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      margin-top: 28px; /* deja espacio para la barra */
    }

    /* Alturas específicas por ventana */
    .vis-win-big  { height: 600px; }
    .vis-win-sm   { height: 296px; }
    .vis-win-wide { height: 380px; }

    /* Hint de interacción */
    .vis-hint {
      position: absolute;
      bottom: 10px;
      right: 12px;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      font-family: 'Poppins', sans-serif;
      pointer-events: none;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .vis-grid { grid-template-columns: 1fr; padding: 0 20px; }
      .vis-win-big, .vis-win-sm, .vis-win-wide { grid-column: 1; grid-row: auto; }
      .vis-win-big  { height: 340px; }
      .vis-win-sm   { height: 260px; }
      .vis-win-wide { height: 260px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left"><a href="projects.html" class="nav-link active">Proyectos</a></div>
  <div class="nav-center"><a href="index.html" class="nav-logo"><span id="nav-typing-text"></span></a></div>

<div style="padding-top:80px;">

  <!-- HEADER -->
  <div class="p-wrap" style="padding-top:60px;padding-bottom:48px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:flex-end;">
    <div>
      <span class="p-eyebrow">Experimentación · ongoing</span>
      <h1 class="p-h1" style="font-size:clamp(56px,11vw,150px);">Visuales</h1>
    </div>
    <div style="padding-bottom:12px;">
      <p class="p-body">Sketches interactivos hechos en p5.js. Exploración, percepción visual y generación procedural.</p>
      <div class="p-tags" style="margin-top:20px;">
        <span class="p-tag">p5.js</span>

        <span class="p-tag">interactivo</span>

    </div>
  </div>

  <div class="p-rule p-bleed" style="margin-bottom:32px;"></div>

  <!-- GRID DE VENTANAS -->
  <div class="vis-grid">

    <!-- VENTANA 1: TV — grande a la izquierda -->
    <div class="vis-win vis-win-big">
      <div class="vis-bar">
        <div class="vis-dot vis-dot-r"></div>
        <div class="vis-dot vis-dot-y"></div>
        <div class="vis-dot vis-dot-g"></div>
        <span class="vis-bar-title">tv_static.js</span>
      </div>
      <iframe src="sketch-tv.html" scrolling="no" loading="lazy"></iframe>
      <div class="vis-hint">click para glitch</div>
    </div>

    <!-- VENTANA 2: Pulse — arriba derecha -->
    <div class="vis-win vis-win-sm">
      <div class="vis-bar">
        <div class="vis-dot vis-dot-r"></div>
        <div class="vis-dot vis-dot-y"></div>
        <div class="vis-dot vis-dot-g"></div>
        <span class="vis-bar-title">pulse.js</span>
      </div>
      <iframe src="sketch-pulse.html" scrolling="no" loading="lazy"></iframe>
      <div class="vis-hint">mover mouse</div>
    </div>

    <!-- VENTANA 3: Trails — abajo derecha -->
    <div class="vis-win vis-win-sm">
      <div class="vis-bar">
        <div class="vis-dot vis-dot-r"></div>
        <div class="vis-dot vis-dot-y"></div>
        <div class="vis-dot vis-dot-g"></div>
        <span class="vis-bar-title">trails.js</span>
      </div>
      <iframe src="sketch-trails.html" scrolling="no" loading="lazy"></iframe>
      <div class="vis-hint">dibujar con mouse</div>
    </div>
  </div>
