  <style>
    .vis-grid {
      columns: 3;
      column-gap: 6px;
      padding: 0 48px;
    }
    .vis-grid img {
      width: 100%;
      display: block;
      margin-bottom: 6px;
      break-inside: avoid;
      border-radius: 4px;
      transition: filter 0.3s ease;
    }
    .vis-grid img:hover { filter: brightness(0.82); }
    /* Alturas distintas para romper la uniformidad */
    .vis-grid img:nth-child(4n+1) { aspect-ratio: 3/4; }
    .vis-grid img:nth-child(4n+2) { aspect-ratio: 4/3; }
    .vis-grid img:nth-child(4n+3) { aspect-ratio: 1/1; }
    .vis-grid img:nth-child(4n)   { aspect-ratio: 2/3; }
    @media (max-width: 768px) {
      .vis-grid { columns: 2; padding: 0 20px; }
    }
  </style>
</head>

<script src="transitions.js"></script>
<script>
(function(){
  const wrap=document.querySelector('.p-strip-wrap'),track=document.getElementById('stripTrack');
  if(!wrap||!track)return;
  let tX=0,cX=0,raf=null;
  function max(){return Math.max(0,track.scrollWidth-wrap.clientWidth);}
  wrap.addEventListener('mousemove',e=>{const r=wrap.getBoundingClientRect();tX=(e.clientX-r.left)/r.width*max();if(!raf)raf=requestAnimationFrame(lerp);});
  wrap.addEventListener('mouseleave',()=>{tX=0;if(!raf)raf=requestAnimationFrame(lerp);});
  function lerp(){cX+=(tX-cX)*0.07;track.style.transform=`translateX(-${cX}px)`;raf=Math.abs(tX-cX)>0.3?requestAnimationFrame(lerp):null;}
  let tx0=0,cx0=0;
  wrap.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;cx0=cX;},{passive:true});
  wrap.addEventListener('touchmove',e=>{tX=Math.max(0,Math.min(max(),cx0+(tx0-e.touches[0].clientX)));if(!raf)raf=requestAnimationFrame(lerp);},{passive:true});
})();
</script>
